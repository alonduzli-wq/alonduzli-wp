<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketch Graphic - עיצוב מתנה אישית</title>
    <style>
        :root {
            --primary-color: #333;
            --accent-color: #ff5a5f;
            --bg-color: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { color: var(--primary-color); }

        /* אזור הפריוויו - המוקאפ */
        .mockup-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
            border: 10px solid #d2b48c; /* צבע דמוי עץ לבלוק */
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
            background: #eee;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* מוסתר עד שמעלים תמונה */
        }

        .placeholder-text {
            color: #888;
            font-size: 0.9em;
        }

        /* כפתור העלאה מעוצב */
        .upload-section {
            margin-top: 20px;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 12px 24px;
            cursor: pointer;
            background-color: var(--accent-color);
            color: white;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .custom-file-upload:hover {
            transform: scale(1.05);
        }

        .btn-order {
            margin-top: 20px;
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sketch Graphic</h1>
        <p>העלה תמונה וראה איך המתנה שלך תיראה:</p>

        <div class="mockup-container" id="mockup">
            <span class="placeholder-text" id="placeholder">כאן תופיע התמונה שלך</span>
            <img id="preview-img" src="#" alt="תצוגה מקדימה">
        </div>

        <div class="upload-section">
            <label for="file-upload" class="custom-file-upload">
                📸 בחר תמונה מהגלריה
            </label>
            <input id="file-upload" type="file" accept="image/*">
        </div>

        <button class="btn-order">הוספה לסל הקניות</button>
    </div>

    <script>
        const fileInput = document.getElementById('file-upload');
        const previewImg = document.getElementById('preview-img');
        const placeholder = document.getElementById('placeholder');

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            
            if (file) {
                const reader = new FileReader();

                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    placeholder.style.display = 'none';
                }

                reader.readAsDataURL(file);
            }
        });
    </script>

</body>
</html>
